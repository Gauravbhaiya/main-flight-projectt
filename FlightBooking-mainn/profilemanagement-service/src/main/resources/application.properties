server.port=8090
spring.application.name=profilemanagement-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/flight_booking?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Mail Configuration (disabled - configure real credentials to enable)