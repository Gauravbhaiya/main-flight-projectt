spring.application.name=API-GATEWAY
server.port=8765

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=PROFILEMANAGEMENT-SERVICE
spring.cloud.gateway.routes[0].uri=lb://profilemanagement-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/profile/**

spring.cloud.gateway.routes[1].id=AUTH-SERVICE
spring.cloud.gateway.routes[1].uri=lb://profilemanagement-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[2].id=FLIGHT-SERVICE
spring.cloud.gateway.routes[2].uri=lb://flight-and-search-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/flight/**

spring.cloud.gateway.routes[3].id=BOOKING-SERVICE
spring.cloud.gateway.routes[3].uri=lb://booking-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/booking/**

spring.cloud.gateway.routes[4].id=FARE-SERVICE
spring.cloud.gateway.routes[4].uri=lb://fare-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payment/**

spring.cloud.gateway.discovery.locator.enabled=true

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot=DEBUG
logging.level.reactor.netty=DEBUG

jwt.secret=supersecretkeythatisverylong123456

# Set the default logging level for the whole application (optional)
logging.level.root=INFO

# Enable DEBUG level logging for your gateway and JWT-related classes
logging.level.org.springframework.web.filter=DEBUG
logging.level.com.example.api_gateway=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.io.jsonwebtoken=DEBUG

