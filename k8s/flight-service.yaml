apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
  namespace: flight-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
    spec:
      containers:
        - name: flight-service
          image: gauravbhaiya/flight-and-search-service:latest
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/flightdatabase?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: flight-secrets
                  key: MYSQL_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flight-secrets
                  key: MYSQL_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: flight-config
                  key: EUREKA_URL
---
apiVersion: v1
kind: Service
metadata:
  name: flight-service
  namespace: flight-app
spec:
  selector:
    app: flight-service
  ports:
    - port: 8085
      targetPort: 8085
  type: ClusterIP
