apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: flight-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: gauravbhaiya/booking-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/bookingdatabase?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: flight-secrets
                  key: MYSQL_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flight-secrets
                  key: MYSQL_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: flight-config
                  key: EUREKA_URL
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: flight-config
                  key: KAFKA_SERVERS
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: flight-app
spec:
  selector:
    app: booking-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
