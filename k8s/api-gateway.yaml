apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: flight-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: gauravbhaiya/api-gateway:latest
          ports:
            - containerPort: 8765
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: flight-config
                  key: EUREKA_URL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: flight-app
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8765
      targetPort: 8765
  type: LoadBalancer
