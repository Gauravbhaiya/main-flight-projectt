apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-frontend
  namespace: flight-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: angular-frontend
  template:
    metadata:
      labels:
        app: angular-frontend
    spec:
      containers:
        - name: angular-frontend
          image: gauravbhaiya/angular-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: angular-frontend
  namespace: flight-app
spec:
  selector:
    app: angular-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
